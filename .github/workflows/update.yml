name: Build MosDNS Rules

# 触发条件
on:
  schedule:
    # 每天北京时间凌晨 4 点 (UTC 时间 20:00) 自动执行
    - cron: '0 20 * * *'
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # v2dat 需要的 Go 环境

      - name: Install v2dat
        run: |
          go install github.com/urlesistiana/v2dat@latest
          # 验证安装
          v2dat -h

      - name: Download dat files
        run: |
          wget -qO geosite.dat https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          wget -qO geoip.dat https://github.com/Loyalsoldier/geoip/releases/latest/download/geoip.dat

      - name: Unpack rules based on rules.txt
        run: |
          # 创建统一的输出目录
          mkdir -p publish
          
          # 逐行读取 rules.txt
          while IFS= read -r line || [ -n "$line" ]; do
            # 忽略空行和带有 # 的注释行
            [[ -z "$line" || "$line" == \#* ]] && continue
            
            # 以 '-' 为分隔符，拆分出类型 (geosite/geoip) 和 标签 (cn/apple 等)
            type=$(echo "$line" | cut -d'-' -f1)
            tag=$(echo "$line" | cut -d'-' -f2-)
            
            echo "正在处理: 类别=$type, 标签=$tag"
            
            if [[ "$type" == "geosite" ]]; then
              v2dat unpack geosite -o publish -f "$tag" geosite.dat
            elif [[ "$type" == "geoip" ]]; then
              v2dat unpack geoip -o publish -f "$tag" geoip.dat
            else
              echo "未知的规则类型: $type"
            fi
          done < rules.txt

      - name: Commit and Push to Repository
        run: |
          # 配置 Git 机器人信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 将生成的 txt 文件加入暂存区
          git add publish/
          
          # 检查是否有文件变更，如果有则提交并推送
          if git diff --staged --quiet; then
            echo "规则无变化，无需提交"
          else
            git commit -m "Auto update mosdns rules $(date +'%Y-%m-%d')"
            git push
          fi