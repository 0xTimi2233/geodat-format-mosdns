name: Build MosDNS Rules

on:
  schedule:
    # 每天北京时间凌晨 4 点 (UTC 时间 20:00) 自动执行
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false

      - name: Install v2dat
        run: go install github.com/urlesistiana/v2dat@latest

      - name: Download dat files
        run: |
          wget -qO geosite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -qO geoip.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat

      - name: Unpack rules based on rules.txt
        run: |
          # 创建 mate 分支需要的目录结构
          mkdir geosite geoip
          
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            
            type=$(echo "$line" | cut -d'-' -f1)
            tag=$(echo "$line" | cut -d'-' -f2-)
            
            echo "正在处理: 类别=$type, 标签=$tag"
            
            if [[ "$type" == "geosite" ]]; then
              # 输出到 geosite 文件夹
              v2dat unpack geosite -o geosite -f "$tag" geosite.dat
            elif [[ "$type" == "geoip" ]]; then
              # 输出到 geoip 文件夹
              v2dat unpack geoip -o geoip -f "$tag" geoip.dat
            fi
          done < rules.txt

      - name: Force push to mate branch
        run: |
          # 初始化全新的 git 环境
          git init
          git checkout -b mate
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 无论文件是否变化，全部添加
          git add .
          git commit -m "Auto update mosdns rules $(date +'%Y-%m-%d')"
          
          # 使用 force 推送覆盖远程的 mate 分支
          git push -f https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git mate